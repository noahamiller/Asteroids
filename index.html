<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroid Cursor Shooter</title>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #main-menu h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        #start-btn {
            padding: 15px 30px;
            font-size: 24px;
            cursor: pointer;
            background: #222;
            border: 2px solid white;
            color: white;
        }

        #high-score-board {
            margin-top: 25px;
            text-align: center;
        }

        #high-score-board h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        #high-score-board ol {
            list-style-position: inside;
            padding: 0;
            margin: 0;
            font-size: 18px;
            color: #ccc;
        }

        #high-score-board ol li {
            margin: 3px 0;
        }

        #powerup-indicator {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 18px;
            color: lime;
            display: none;
            pointer-events: none;
        }

        #game-canvas {
            display: none;
            background: black;
        }

        #exit-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            display: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- Main Menu -->
    <div id="main-menu">
        <h1>Asteroid Shooter</h1>
        <button id="start-btn">Start Game</button>
        <div id="high-score-board">
            <h2>High Scores</h2>
            <ol id="high-score-list"></ol>
        </div>
    </div>

    <!-- Exit Button -->
    <div id="exit-btn">X</div>

    <!-- Powerup Indicator -->
    <div id="powerup-indicator">&#9733; MULTI-LASER &#9733;</div>

    <!-- Game Canvas -->
    <canvas id="game-canvas" width="800" height="600"></canvas>

    <script src="game.js"></script>
</body>
</html>
